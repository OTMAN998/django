{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Connexion - CV Generator Pro{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="glass-card">
            <h2 class="text-center mb-4">Connexion</h2>
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary btn-lg">Se connecter</button>
                </div>
            </form>
            <div class="text-center mt-3">
                <p class="small text-muted mb-0">Pas encore de compte ? <a href="{% url 'register' %}">Créer un compte</a></p>
                <p class="small text-muted"><a href="{% url 'password_reset' %}">Mot de passe oublié ?</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
