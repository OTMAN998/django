{% extends "base.html" %}

{% block title %}Account Activated{% endblock %}

{% block content %}
<div class="auth-container text-center">
    <h2 class="mb-4 font-weight-bold" style="color: #4ade80;">Account Activated!</h2>
    <div class="mb-4" style="font-size: 3rem; color: #4ade80;">✅</div>
    <p class="text-muted mb-4">Thank you for confirming your email! Your account is now fully active.</p>
    <a href="{% url 'login' %}" class="btn btn-primary btn-lg">Log in now</a>
</div>
{% endblock %}
