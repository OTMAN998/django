{% extends "base.html" %}

{% block title %}Verify Your Email{% endblock %}

{% block content %}
<div class="auth-container text-center">
    <h2 class="mb-4 font-weight-bold" style="color: #f8fafc;">Check Your Inbox</h2>
    <div class="mb-4" style="font-size: 3rem; color: #8b5cf6;">✉️</div>
    <p class="text-muted mb-4">We've sent an email to the address you provided. Please check your inbox (and spam folder) and click the verification link to activate your account.</p>
    <a href="{% url 'home' %}" class="btn btn-outline-primary">Return to Home</a>
</div>
{% endblock %}
