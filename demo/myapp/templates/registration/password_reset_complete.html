{% extends "base.html" %}

{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<div class="auth-container text-center">
    <h2 class="mb-4 font-weight-bold" style="color: #4ade80;">Password Changed!</h2>
    <div class="mb-4" style="font-size: 3rem; color: #4ade80;">✅</div>
    <p class="text-muted mb-4">Your password has been successfully reset. You may now log in with your new password.</p>
    <a href="{% url 'login' %}" class="btn btn-primary btn-lg">Log in now</a>
</div>
{% endblock %}
