<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}CV Generator{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #0f1115;
        color: #e2e8f0;
      }
      .navbar {
        background: rgba(15, 17, 21, 0.8) !important;
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      .navbar-brand, .nav-link {
        font-weight: 500;
      }
      .navbar-brand {
        background: linear-gradient(90deg, #60a5fa, #c084fc);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: 700;
      }
      .auth-container {
        max-width: 450px;
        margin: 4rem auto;
        padding: 2.5rem;
        background: #1e2128;
        border-radius: 16px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: transform 0.3s ease;
      }
      .auth-container:hover {
        transform: translateY(-2px);
      }
      .btn-primary {
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        border: none;
        border-radius: 8px;
        padding: 0.75rem 1.5rem;
        font-weight: 600;
        transition: opacity 0.2s, transform 0.2s;
      }
      .btn-primary:hover {
        opacity: 0.9;
        transform: translateY(-1px);
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      }
      .form-control {
        background-color: #111318;
        border: 1px solid #334155;
        color: #f8fafc;
        border-radius: 8px;
        padding: 0.75rem;
      }
      .form-control:focus {
        background-color: #0f1115;
        border-color: #8b5cf6;
        box-shadow: 0 0 0 0.2rem rgba(139, 92, 246, 0.25);
        color: #ffffff;
      }
      /* Custom tweaks for Crispy forms */
      .form-label, label {
        font-weight: 500;
        color: #cbd5e1;
        margin-bottom: 0.5rem;
      }
      .help-block, .text-muted, .form-text {
        color: #64748b !important;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
      <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">CV Generator</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link" href="{% url 'home' %}">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'todos' %}">Todos</a>
            </li>
          </ul>
          <ul class="navbar-nav">
            {% if request.user.is_authenticated %}
              <li class="nav-item">
                <form method="post" action="{% url 'logout' %}" class="d-inline">
                  {% csrf_token %}
                  <button type="submit" class="btn btn-outline-light btn-sm mt-1">Logout ({{ request.user.username }})</button>
                </form>
              </li>
            {% else %}
              <li class="nav-item"><a class="nav-link" href="{% url 'login' %}">Login</a></li>
              <li class="nav-item"><a class="btn btn-primary btn-sm ms-2 mt-1" href="{% url 'register' %}">Register</a></li>
            {% endif %}
          </ul>
        </div>
      </div>
    </nav>
    <div class="container" style="margin-top: 100px;">
      {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
